{% extends 'base.html' %} {% load static %} {% block full_width %}
<style>
  .g-background {
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)),
      url("{% static 'images/background.jpg' %}");
    background-size: cover;
    background-position: center;
    backdrop-filter: blur(10px);
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 2rem;
    padding-bottom: 2rem;
  }
</style>
<div class="g-background text-white text-center">
  <div class="container">
    <div class="container mt-4">
      <h1 class="mb-5 text-center">Articles & Thoughts</h1>

      <div class="row">
        {% for article in articles %}

        <div class="col-md-8 offset-md-2 mb-5">
          <div class="card shadow-sm">
            <div class="card-body p-4" style="background-color: #e4e6e8">
              <h2 class="card-title font-weight-bold" style="color: #333333">
                {{ article.title }}
              </h2>
              <p class="text-muted mb-4">
                <small>Published on {{ article.date_published|date }}</small>
              </p>

              <hr />
              <div
                class="card-text mt-4"
                style="font-size: 1.1rem; line-height: 1.8"
              >
                {{ article.body|linebreaks }}
              </div>
            </div>
          </div>
        </div>

        {% empty %}
        <div class="col-12 text-center mt-5">
          <h3>No articles have been written yet.</h3>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endblock %}
  </div>
</div>
